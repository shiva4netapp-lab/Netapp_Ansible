- name: netapp_hc_report
  description: Generate NetApp ONTAP Web Style Health Check Report
  type: ansible

  categories:
    - Samba_Ansibleforms

  roles:
    - public

  playbook: netapp_hc_report.yml
  inventory: ""

  fields:
    - name: hostname
      label: Cluster Management IP
      type: text
      required: true
      placeholder: 192.168.226.20

    - name: username
      label: Username
      type: text
      required: true
      default: admin

    - name: password
      label: Password
      type: password
      noLog: true
      required: true
