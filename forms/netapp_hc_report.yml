- name: netapp_hc_report
  description: Generate NetApp ONTAP Health Check Report
  type: ansible

  categories:
    - Samba_Ansibleforms

  roles:
    - public

  playbook: playbooks/netapp_hc_report.yml

  inventory: ""

  fields:
    - name: hostname
      label: Cluster Management IP
      type: text
      required: true

    - name: username
      label: Username
      type: text
      required: true
      default: admin

    - name: password
      label: Password
      type: password
      noLog: true
      required: true
